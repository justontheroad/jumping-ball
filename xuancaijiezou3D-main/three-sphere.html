<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 无限轨道弹跳球</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; overflow: hidden; }
    canvas { display: block; }

    /* GameOver 弹窗 */
    #gameOverOverlay {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.75);
      z-index: 100;
      justify-content: center; align-items: center;
      backdrop-filter: blur(8px);
      animation: overlayIn 0.3s ease-out;
    }
    @keyframes overlayIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #gameOverBox {
      text-align: center;
      padding: 50px 60px;
      background: linear-gradient(135deg, rgba(20, 10, 40, 0.95), rgba(10, 5, 25, 0.98));
      border: 1px solid rgba(255, 104, 253, 0.3);
      border-radius: 20px;
      box-shadow: 0 0 60px rgba(255, 104, 253, 0.15), 0 0 120px rgba(21, 190, 252, 0.08);
      animation: boxIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes boxIn {
      from { transform: scale(0.6); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    #gameOverBox h1 {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 52px;
      font-weight: 800;
      color: #ff4060;
      text-shadow: 0 0 20px rgba(255, 64, 96, 0.5), 0 0 40px rgba(255, 64, 96, 0.2);
      margin-bottom: 12px;
      letter-spacing: 4px;
    }
    #gameOverBox p {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 16px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 36px;
    }
    #restartBtn {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #ff68fd, #15befc);
      border: none;
      padding: 14px 48px;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255, 104, 253, 0.3);
      letter-spacing: 2px;
    }
    #restartBtn:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 30px rgba(255, 104, 253, 0.5);
    }
    #restartBtn:active {
      transform: scale(0.97);
    }

    /* 胜利弹窗 */
    #victoryOverlay {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 200;
      justify-content: center; align-items: center;
      backdrop-filter: blur(8px);
      animation: overlayIn 0.4s ease-out;
    }
    #victoryBox {
      text-align: center;
      padding: 50px 60px;
      background: linear-gradient(135deg, rgba(10, 5, 30, 0.95), rgba(5, 2, 15, 0.98));
      border: 1px solid rgba(100, 180, 255, 0.4);
      border-radius: 24px;
      animation: boxIn 0.4s ease-out;
    }
    @keyframes boxIn {
      from { transform: scale(0.8) translateY(30px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    #victoryBox h1 {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 48px;
      font-weight: 900;
      background: linear-gradient(135deg, #64b5f6, #e040fb, #ffd740);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      letter-spacing: 4px;
    }
    #victoryBox p {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 18px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 36px;
    }
    #victoryBtn {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #64b5f6, #e040fb);
      border: none;
      padding: 14px 48px;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(100, 181, 246, 0.3);
      letter-spacing: 2px;
    }
    #victoryBtn:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 30px rgba(100, 181, 246, 0.5);
    }
    #victoryBtn:active {
      transform: scale(0.97);
    }

    /* 距离显示 */
    #distanceUI {
      position: fixed;
      top: 30px;
      right: 40px;
      text-align: right;
      z-index: 50;
      pointer-events: none;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    #distCurrent {
      font-size: 52px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
      line-height: 1;
      text-shadow:
        0 0 15px rgba(100, 180, 255, 0.6),
        0 0 30px rgba(100, 180, 255, 0.3),
        0 0 60px rgba(100, 180, 255, 0.15);
    }
    #distCurrent .unit {
      font-size: 24px;
      font-weight: 600;
      color: rgba(180, 210, 255, 0.7);
      margin-left: 4px;
    }
    #distTarget {
      font-size: 16px;
      font-weight: 500;
      color: rgba(180, 210, 255, 0.5);
      margin-top: 8px;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(100, 180, 255, 0.25);
      transition: color 0.4s, text-shadow 0.4s;
    }
    #distTarget.revealed {
      color: rgba(224, 64, 251, 0.8);
      text-shadow: 0 0 12px rgba(224, 64, 251, 0.4), 0 0 24px rgba(224, 64, 251, 0.15);
    }
    #levelName {
      font-size: 20px;
      font-weight: 700;
      color: rgba(180, 210, 255, 0.6);
      letter-spacing: 2px;
      margin-bottom: 4px;
      text-shadow: 0 0 10px rgba(100, 180, 255, 0.3);
      transition: opacity 0.5s;
    }

    /* 关卡名称闪现 */
    #levelAnnounce {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 60;
      pointer-events: none;
      opacity: 0;
    }
    #levelAnnounce.show {
      animation: levelFlash 2.5s ease-out forwards;
    }
    @keyframes levelFlash {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
      15%  { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
      70%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
    }
    #levelAnnounce .level-num {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: rgba(180, 210, 255, 0.8);
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    #levelAnnounce .level-title {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 56px;
      font-weight: 900;
      background: linear-gradient(135deg, #64b5f6, #e040fb, #ffd740);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 6px;
      margin-top: 8px;
    }
    #levelAnnounce .level-sub {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 16px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 12px;
      letter-spacing: 2px;
    }

    /* 关卡选择界面 */
    #levelSelectOverlay {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, rgba(5, 2, 20, 0.92) 0%, rgba(2, 1, 10, 0.98) 100%);
      z-index: 300;
      justify-content: center; align-items: center;
      backdrop-filter: blur(12px);
      animation: overlayIn 0.4s ease-out;
    }
    #levelSelectContainer {
      text-align: center;
      width: 90%;
      max-width: 750px;
      animation: containerIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes containerIn {
      from { transform: scale(0.85) translateY(40px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    #levelSelectTitle {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(135deg, #64b5f6, #e040fb, #ffd740);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 6px;
      margin-bottom: 8px;
    }
    #levelSelectSub {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      color: rgba(180, 210, 255, 0.4);
      letter-spacing: 3px;
      margin-bottom: 40px;
    }
    #levelCards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 36px;
    }
    .level-card {
      width: 125px;
      padding: 24px 12px 20px;
      border-radius: 16px;
      background: linear-gradient(145deg, rgba(20, 12, 45, 0.9), rgba(8, 4, 22, 0.95));
      border: 1px solid rgba(100, 180, 255, 0.15);
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.25s ease,
                  border-color 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .level-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(100, 180, 255, 0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .level-card:hover {
      transform: translateY(-6px) scale(1.04);
      box-shadow: 0 8px 32px rgba(100, 180, 255, 0.2), 0 0 60px rgba(100, 180, 255, 0.06);
      border-color: rgba(100, 180, 255, 0.4);
    }
    .level-card:active {
      transform: translateY(-2px) scale(0.98);
    }
    .level-card .card-num {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: rgba(100, 180, 255, 0.5);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .level-card .card-name {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 2px;
      margin-bottom: 6px;
      text-shadow: 0 0 12px rgba(100, 180, 255, 0.3);
    }
    .level-card .card-name-en {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: rgba(180, 210, 255, 0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .level-card .card-desc {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 11px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 10px;
      letter-spacing: 1px;
    }
    .level-card.locked {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }
    .level-card.locked::after {
      content: '\f023';
      font-family: 'Font Awesome 6 Free', 'Segoe UI', sans-serif;
      font-size: 18px;
      position: absolute;
      top: 10px;
      right: 12px;
      color: rgba(255, 255, 255, 0.2);
    }
    .level-card.active {
      border-color: rgba(100, 180, 255, 0.6);
      box-shadow: 0 0 20px rgba(100, 180, 255, 0.15);
    }
    .level-card.active .card-name {
      background: linear-gradient(135deg, #64b5f6, #e040fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    /* 模式切换 Tab */
    #modeTabs {
      display: flex;
      justify-content: center;
      gap: 0;
      margin-bottom: 32px;
    }
    .mode-tab {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: rgba(180, 210, 255, 0.4);
      background: transparent;
      border: none;
      padding: 10px 36px;
      cursor: pointer;
      letter-spacing: 3px;
      position: relative;
      transition: color 0.3s;
    }
    .mode-tab::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, #64b5f6, #e040fb);
      border-radius: 1px;
      transition: width 0.3s ease;
    }
    .mode-tab.active {
      color: #fff;
    }
    .mode-tab.active::after {
      width: 80%;
    }
    .mode-tab:hover {
      color: rgba(180, 210, 255, 0.8);
    }

    /* 无限模式面板 */
    #endlessPanel {
      display: none;
      flex-direction: column;
      align-items: center;
      animation: containerIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    #endlessPanel.visible {
      display: flex;
    }
    .endless-card {
      width: 320px;
      padding: 48px 40px 40px;
      border-radius: 24px;
      background: linear-gradient(145deg, rgba(20, 12, 45, 0.9), rgba(8, 4, 22, 0.95));
      border: 1px solid rgba(100, 180, 255, 0.15);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .endless-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(100, 180, 255, 0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .endless-en {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: rgba(180, 210, 255, 0.5);
      letter-spacing: 10px;
      margin-bottom: 8px;
    }
    .endless-zh {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 52px;
      font-weight: 900;
      background: linear-gradient(135deg, #64b5f6, #e040fb, #ffd740);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 12px;
      margin-bottom: 28px;
    }
    .endless-divider {
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(100, 180, 255, 0.3), transparent);
      margin: 0 auto 20px;
    }
    .endless-label {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 12px;
      color: rgba(180, 210, 255, 0.4);
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .endless-best-dist {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: #ffd740;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255, 215, 64, 0.3);
    }
    .endless-best-stage {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      color: rgba(180, 210, 255, 0.5);
      letter-spacing: 2px;
      margin-top: 4px;
      margin-bottom: 20px;
    }
    .endless-run-info {
      margin-top: 16px;
      margin-bottom: 8px;
    }
    .endless-run-dist {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.8);
      letter-spacing: 2px;
    }
    .endless-run-stage {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      color: rgba(180, 210, 255, 0.4);
      letter-spacing: 2px;
      margin-top: 4px;
    }
    .endless-new-record {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffd740, #ff6e40, #e040fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 3px;
      margin-top: 8px;
      animation: newRecordPulse 1.2s ease-in-out infinite;
    }
    @keyframes newRecordPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.08); }
    }
    #endlessStartBtn {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #64b5f6, #e040fb);
      border: none;
      padding: 14px 48px;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(100, 181, 246, 0.3);
      letter-spacing: 3px;
      margin-top: 24px;
    }
    #endlessStartBtn:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 30px rgba(100, 181, 246, 0.5);
    }
    #endlessStartBtn:active {
      transform: scale(0.97);
    }
    .endless-total-runs {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 12px;
      color: rgba(180, 210, 255, 0.3);
      letter-spacing: 2px;
      margin-top: 16px;
    }

    /* GameOver 无限模式扩展 */
    #gameOverEndlessInfo {
      display: none;
      margin-top: 16px;
      text-align: center;
    }
    #gameOverEndlessInfo.visible {
      display: block;
    }
    .go-dist {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #ffd740;
      letter-spacing: 2px;
      text-shadow: 0 0 15px rgba(255, 215, 64, 0.3);
    }
    .go-stage {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      color: rgba(180, 210, 255, 0.5);
      letter-spacing: 2px;
      margin-top: 4px;
    }
    .go-new-record {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffd740, #ff6e40, #e040fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 3px;
      margin-top: 8px;
      animation: newRecordPulse 1.2s ease-in-out infinite;
    }
    #retryBtn {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #ff68fd, #15befc);
      border: none;
      padding: 14px 48px;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255, 104, 253, 0.3);
      letter-spacing: 2px;
      margin-top: 20px;
    }
    #retryBtn:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 30px rgba(255, 104, 253, 0.5);
    }
    #retryBtn:active {
      transform: scale(0.97);
    }
    #backToMenuLink {
      display: none;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      color: rgba(180, 210, 255, 0.5);
      background: transparent;
      border: none;
      cursor: pointer;
      letter-spacing: 2px;
      margin-top: 16px;
      transition: color 0.2s;
    }
    #backToMenuLink:hover {
      color: rgba(180, 210, 255, 0.9);
    }
    #backToMenuLink.visible {
      display: inline-block;
    }

    /* 游戏内返回菜单按钮 */
    #inGameMenuBtn {
      display: none;
      position: fixed;
      top: 30px;
      left: 40px;
      z-index: 50;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: rgba(180, 210, 255, 0.5);
      background: rgba(10, 5, 30, 0.6);
      border: 1px solid rgba(100, 180, 255, 0.15);
      padding: 8px 20px;
      border-radius: 50px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      letter-spacing: 2px;
      backdrop-filter: blur(6px);
    }
    #inGameMenuBtn:hover {
      color: rgba(180, 210, 255, 0.9);
      border-color: rgba(100, 180, 255, 0.4);
    }

    /* 连击鼓励 */
    #comboUI {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease-out;
    }
    #comboUI.visible { opacity: 1; }
    #comboWord {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 42px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 4px;
      text-transform: uppercase;
      transition: transform 0.15s ease-out, text-shadow 0.3s ease-out;
      transform: scale(1);
    }
    #comboWord.pop {
      animation: comboPop 0.3s ease-out;
    }
    @keyframes comboPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    #comboCount {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      margin-top: 4px;
      letter-spacing: 2px;
      transition: transform 0.15s ease-out;
    }
    #comboCount.bump {
      animation: comboBump 0.25s ease-out;
    }
    @keyframes comboBump {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <!-- 关卡选择界面 -->
  <div id="levelSelectOverlay">
    <div id="levelSelectContainer">
      <div id="modeTabs">
        <button class="mode-tab active" id="tabLevels">关卡模式</button>
        <button class="mode-tab" id="tabEndless">无限模式</button>
      </div>
      <div id="levelSelectTitle">选择关卡</div>
      <div id="levelSelectSub">INTERSTELLAR</div>
      <div id="levelCards"></div>
      <div id="endlessPanel">

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 10);
    camera.lookAt(0, 0, -10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enableRotate  = false;
    controls.enableZoom    = false;
    controls.enablePan     = false;
    controls.target.set(0, 0, -10);

    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(4000 * 3);
    for (let i = 0; i < starPos.length; i++) starPos[i] = (Math.random() - 0.5) * 300;
    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    scene.add(new THREE.Points(starGeo,
      new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.7 })));

    // ===== 加速背景粒子系统（螺旋隧道，跟随球颜色） =====
    const BOOST_PARTICLE_COUNT = 8000;
    const boostParticleGeo = new THREE.BufferGeometry();
    const boostPosArr = new Float32Array(BOOST_PARTICLE_COUNT * 3);
    const boostSizeArr = new Float32Array(BOOST_PARTICLE_COUNT);
    const boostParticleData = [];

    for (let i = 0; i < BOOST_PARTICLE_COUNT; i++) {
      const angle = Math.random() * Math.PI * 2;
      const tunnelR = 3 + Math.random() * 25;
      const zOff = -60 + Math.random() * 120;
      const spiralPhase = Math.random() * Math.PI * 2;
      const spiralArm = Math.floor(Math.random() * 3);

      boostPosArr[i * 3]     = tunnelR * Math.cos(angle);
      boostPosArr[i * 3 + 1] = (Math.random() - 0.5) * 30;
      boostPosArr[i * 3 + 2] = zOff;

      const sizeRoll = Math.random();
      if (sizeRoll < 0.7) {
        boostSizeArr[i] = 0.06 + Math.random() * 0.12;
      } else if (sizeRoll < 0.92) {
        boostSizeArr[i] = 0.2 + Math.random() * 0.4;
      } else {
        boostSizeArr[i] = 0.6 + Math.random() * 1.0;
      }

      boostParticleData.push({
        angle,
        tunnelR,
        baseTunnelR: tunnelR,
        zOff,
        spiralPhase,
        spiralArm,
        speed: 1.5 + Math.random() * 3.0,
        zSpeed: 5 + Math.random() * 15,
        pulsePhase: Math.random() * Math.PI * 2,
        sizeBase: boostSizeArr[i],
      });
    }

    boostParticleGeo.setAttribute('position', new THREE.BufferAttribute(boostPosArr, 3));
    boostParticleGeo.setAttribute('aSize', new THREE.BufferAttribute(boostSizeArr, 1));

    // 粒子颜色平滑过渡目标
    let boostParticleColorTarget = new THREE.Color(0.4, 0.53, 1.0);  // 默认蓝色（球初始色）
    let boostParticleColorCurrent = new THREE.Color(0.4, 0.53, 1.0);
    const BOOST_COLOR_LERP_SPEED = 3.0;  // 颜色过渡速度

    const boostParticleMat = new THREE.ShaderMaterial({
      uniforms: {
        uOpacity: { value: 0.0 },
        uColor: { value: new THREE.Color(0.4, 0.53, 1.0) },
      },
      vertexShader: `
        attribute float aSize;
        varying float vDist;
        void main() {
          vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
          vDist = -mvPos.z;
          gl_PointSize = aSize * (250.0 / max(1.0, -mvPos.z));
          gl_Position = projectionMatrix * mvPos;
        }
      `,
      fragmentShader: `
        uniform float uOpacity;
        uniform vec3 uColor;
        varying float vDist;
        void main() {
          float d = length(gl_PointCoord - 0.5) * 2.0;
          float alpha = 1.0 - smoothstep(0.0, 1.0, d);
          float glow = exp(-d * 3.0) * 0.7;
          vec3 col = uColor * (1.0 + glow);
          float fog = smoothstep(100.0, 15.0, vDist);
          gl_FragColor = vec4(col, (alpha + glow * 0.6) * uOpacity * fog);
        }
      `,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    const boostParticles = new THREE.Points(boostParticleGeo, boostParticleMat);
    boostParticles.visible = false;
    scene.add(boostParticles);

    let boostParticleTime = 0;
    let boostParticleVisible = false;
    let boostFadeAlpha = 0;

    // 设置粒子目标颜色（从球当前颜色获取）
    function setBoostParticleColor(colorKey) {
      if (!colorKey || !COLORS[colorKey]) return;
      const rgb = COLORS[colorKey].rgb;
      boostParticleColorTarget.set(rgb[0] / 255, rgb[1] / 255, rgb[2] / 255);
    }

    function updateBoostParticles(dt) {
      const isActive = boostTimer > 0;
      if (isActive && !boostParticleVisible) {
        boostParticleVisible = true;
        boostParticles.visible = true;
        // 加速开始时同步当前球颜色
        setBoostParticleColor(ballColorKey);
        boostParticleColorCurrent.copy(boostParticleColorTarget);
      }
      if (isActive) {
        boostFadeAlpha = Math.min(1.0, boostFadeAlpha + dt * 2.5);
      } else {
        boostFadeAlpha = Math.max(0.0, boostFadeAlpha - dt * 1.2);
        if (boostFadeAlpha <= 0) {
          boostParticleVisible = false;
          boostParticles.visible = false;
        }
      }
      boostParticleMat.uniforms.uOpacity.value = boostFadeAlpha * 0.85;

      if (boostFadeAlpha <= 0) return;

      // 颜色平滑过渡（加速过程中球变色时粒子也跟着变）
      boostParticleColorCurrent.lerp(boostParticleColorTarget, 1 - Math.exp(-BOOST_COLOR_LERP_SPEED * dt));
      boostParticleMat.uniforms.uColor.value.copy(boostParticleColorCurrent);

      boostParticleTime += dt;
      const posAttr = boostParticleGeo.getAttribute('position');
      const sizeAttr = boostParticleGeo.getAttribute('aSize');

      for (let i = 0; i < BOOST_PARTICLE_COUNT; i++) {
        const pd = boostParticleData[i];
        pd.angle += pd.speed * dt;
        pd.zOff += pd.zSpeed * dt;
        if (pd.zOff > 60) {
          pd.zOff -= 120;
        }

        const spiralAngle = pd.angle + pd.spiralArm * (Math.PI * 2 / 3);
        const zNorm = (pd.zOff + 60) / 120;
        const tunnelConverge = 1.0 - Math.abs(zNorm - 0.5) * 0.6;
        const r = pd.baseTunnelR * tunnelConverge;

        const spiralX = Math.sin(pd.zOff * 0.08 + pd.spiralPhase) * r * 0.4;
        const spiralY = Math.cos(pd.zOff * 0.08 + pd.spiralPhase) * r * 0.3;

        const x = r * Math.cos(spiralAngle) + spiralX;
        const y = r * Math.sin(spiralAngle) * 0.5 + spiralY + ballY * 0.25;
        const z = pd.zOff;

        posAttr.setXYZ(i, x, y, z);

        const sizePulse = 1.0 + Math.sin(boostParticleTime * 2.0 + pd.pulsePhase) * 0.2;
        sizeAttr.setX(i, pd.sizeBase * sizePulse);
      }
      posAttr.needsUpdate = true;
      sizeAttr.needsUpdate = true;
    }

    scene.add(new THREE.AmbientLight(0x223355, 1.8));

    const keyLight = new THREE.PointLight(0xffffff, 150, 50);
    keyLight.position.set(5, 8, 5);
    keyLight.castShadow = true;
    scene.add(keyLight);

    const fillLight = new THREE.PointLight(0x6633ff, 70, 30);
    fillLight.position.set(-5, -2, 3);
    scene.add(fillLight);

    const movingLight = new THREE.PointLight(0xff6600, 60, 25);
    scene.add(movingLight);

    const lightBall = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 8, 8),
      new THREE.MeshBasicMaterial({ color: 0xff9933 })
    );
    scene.add(lightBall);

    const GROUND_Y      = -2.0;
    const BALL_RADIUS   = 0.5;
    const GRAVITY_Y     = -14.7;   // 基础重力加速度（1.5倍）
    const INIT_HEIGHT   = 3.0;    // 弹跳高度（相对地面，固定不衰减）
    const VISIBLE_DEPTH = 120;    // 球前方可见距离

    // 弹跳物理：h = INIT_HEIGHT，g = |gravity|
    const _g = Math.abs(GRAVITY_Y);
    const _t_down = Math.sqrt(2 * INIT_HEIGHT / _g);
    const BOUNCE_PERIOD = 2 * _t_down;

    // ===== 加速轨道系统 =====
    const BOOST_DURATION = 10.0;        // 加速持续秒数
    const BOOST_GRAVITY_MULT = 3.0;     // 加速时重力倍数
    let boostTimer = 0;                 // 加速剩余时间（0=未加速）
    let currentGravityY = GRAVITY_Y;    // 当前重力
    let boostCharging = false;          // 踩到加速轨道后原地蓄力中（velZ=0）

    // 根据当前重力计算弹跳周期（重力变了，周期也变）
    function getCurrentBouncePeriod() {
      const g = Math.abs(currentGravityY);
      const tDown = Math.sqrt(2 * INIT_HEIGHT / g);
      return 2 * tDown;
    }

    // 纯粹重算 velZ（不改变球颜色），用于加速恢复 / 重力变化后同步速度
    function recalcVelZ() {
      let nearestAheadZ = -Infinity;
      for (const z of groupZList) {
        if (z < -0.5 && z > nearestAheadZ) {
          nearestAheadZ = z;
        }
      }
      if (nearestAheadZ > -Infinity) {
        const period = getCurrentBouncePeriod();
        velZ = Math.abs(nearestAheadZ) / period;
      }
    }

    function recalcVelZFromAir() {
      let nearestAheadZ = -Infinity;
      for (const z of groupZList) {
        if (z < -0.5 && z > nearestAheadZ) {
          nearestAheadZ = z;
        }
      }
      if (nearestAheadZ <= -Infinity) return;

      const g = Math.abs(GRAVITY_Y);
      const h = ballY - floorContact;
      const normalVelY = Math.sqrt(2 * g * Math.max(INIT_HEIGHT - h, 0));
      if (velY > 0 && velY > normalVelY * 1.1) {
        velY = normalVelY;
      }

      let timeToLand;
      if (h <= 0.01) {
        timeToLand = getCurrentBouncePeriod();
      } else {
        const vyUp = velY > 0 ? velY : 0;
        const tUp = vyUp / g;
        const hTop = h + vyUp * tUp - 0.5 * g * tUp * tUp;
        const tDown = Math.sqrt(2 * Math.max(hTop, 0) / g);
        timeToLand = tUp + tDown;
        if (timeToLand < 0.1) timeToLand = getCurrentBouncePeriod();
      }

      velZ = Math.abs(nearestAheadZ) / timeToLand;
    }

    // 轨道组间距
    const GAP_MIN = 3.75;
    const GAP_MAX = 7.5;

    // ===== 颜色定义 =====
    // 基础颜色（1-5关）：3种
    // 第六关解锁：绿色
    // 第八关解锁：橙色
    // 第十关解锁：紫色
    const COLORS = {
      pink:   { hex: 0xff68fd, rgb: [255, 104, 253] },  // 粉色（基础）
      yellow: { hex: 0xffe528, rgb: [255, 229,  40] },  // 黄色（基础）
      blue:   { hex: 0x15befc, rgb: [ 21, 190, 252] },  // 蓝色（基础）
      green:  { hex: 0x00ff88, rgb: [  0, 255, 136] },  // 绿色（第6关解锁）
      orange: { hex: 0xff8844, rgb: [255, 136,  68] },  // 橙色（第8关解锁）
      purple: { hex: 0xaa66ff, rgb: [170, 102, 255] }   // 紫色（第10关解锁）
    };

    // 根据当前关卡获取可用颜色
    function getAvailableColors() {
      return strategy.getAvailableColors();
    }

    function randColor() {
      const available = getAvailableColors();
      return available[Math.floor(Math.random() * available.length)];
    }

    function randTwoColors() {
      const available = getAvailableColors();
      const shuffled = [...available].sort(() => Math.random() - 0.5);
      return [shuffled[0], shuffled[1]];
    }

    function randThreeColors() {
      const available = getAvailableColors();
      const shuffled = [...available].sort(() => Math.random() - 0.5);
      // 如果可用颜色少于3种，返回所有可用颜色
      if (shuffled.length <= 3) return shuffled;
      return [shuffled[0], shuffled[1], shuffled[2]];
    }

    // ===== 轨道组尺寸 =====
    const PLATE_HEIGHT = 0.12;

    // 类型1：长直轨道（一块长板）
    const LONG_SIZE_X = 5.25;
    const LONG_SIZE_Z = 1.2;
    // 类型2/3：方形轨道（小方块）
    const SQ_SIZE     = 1.05;   // 方块边长
    const SQ_SPACING  = 1.35;   // 方块中心间距
    const SQ_OFFSET   = (SQ_SPACING - SQ_SIZE) / 2; // 方块中心到长板中心的 X 偏移

    // ===== 几何体（共享） =====
    const longGeo = new THREE.BoxGeometry(LONG_SIZE_X, PLATE_HEIGHT, LONG_SIZE_Z);
    const sqGeo   = new THREE.BoxGeometry(SQ_SIZE, PLATE_HEIGHT, SQ_SIZE);

    // 生成白色箭头纹理（Canvas 动态绘制）
    // 为指定颜色生成带白色箭头的纹理
    function createArrowTextureForColor(colorKey) {
      const size = 128;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      // 先填方块底色
      ctx.fillStyle = COLORS[colorKey].hex;
      ctx.fillRect(0, 0, size, size);
      // 叠加白色箭头（朝上 = +Z 方向）
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(size * 0.5, size * 0.15);  // 箭头尖端
      ctx.lineTo(size * 0.72, size * 0.45);
      ctx.lineTo(size * 0.58, size * 0.45);
      ctx.lineTo(size * 0.58, size * 0.82);
      ctx.lineTo(size * 0.42, size * 0.82);
      ctx.lineTo(size * 0.42, size * 0.45);
      ctx.lineTo(size * 0.28, size * 0.45);
      ctx.closePath();
      ctx.fill();
      const tex = new THREE.CanvasTexture(canvas);
      tex.needsUpdate = true;
      return tex;
    }
    // 为每种颜色预生成箭头纹理
    const arrowTextures = {};
    for (const ck of Object.keys(COLORS)) {
      arrowTextures[ck] = createArrowTextureForColor(ck);
    }

    function makeMat(colorKey) {
      const rgb = COLORS[colorKey].rgb;
      return new THREE.MeshStandardMaterial({
        color: COLORS[colorKey].hex,
        metalness: 0.3, roughness: 0.35,
        emissive: new THREE.Color(rgb[0]*0.5/255, rgb[1]*0.5/255, rgb[2]*0.5/255),
        transparent: true, opacity: 1.0
      });
    }

    // 白色发光材质（加速长直轨道专用）
    function makeBoostMat() {
      return new THREE.MeshStandardMaterial({
        color: 0xffffff,
        metalness: 0.1, roughness: 0.2,
        emissive: new THREE.Color(0.5, 0.5, 0.7),
        transparent: true, opacity: 0.95
      });
    }


    // 为方块创建材质数组（6面）：顶面叠加箭头纹理
    function makeSqMats(colorKey) {
      const base = makeMat(colorKey);
      // BoxGeometry 面顺序: +X, -X, +Y, -Y, +Z, -Z
      // 顶面是 +Y (index 2)
      const topMat = makeMat(colorKey);
      topMat.map = arrowTextures[colorKey];
      topMat.color.set(0xffffff);
      // 左右+前后+底面用 base（共享材质不影响，因为这里是数组引用）
      // 为了避免共享 dispose 问题，侧面各创建新材质
      const side1 = makeMat(colorKey);
      const side2 = makeMat(colorKey);
      const side3 = makeMat(colorKey);
      const side4 = makeMat(colorKey);
      const bottom = makeMat(colorKey);
      return [side1, side2, topMat, bottom, side3, side4]; // +X, -X, +Y, -Y, +Z, -Z
    }

    // ===== 关卡系统 =====
    const LEVELS = [
      { name: '永恒号', nameEn: 'Endurance', maxType: 1, winHits: 5 },
      { name: '水星', nameEn: 'Miller', maxType: 2, winHits: 15 },
      { name: '曼恩星球', nameEn: 'Mann', maxType: 2, winHits: 30 },
      { name: '米勒星球', nameEn: 'Miller-2', maxType: 3, winHits: 50 },
      { name: '土星', nameEn: 'Saturn', maxType: 3, winHits: 80 },
      { name: '木星', nameEn: 'Jupiter', maxType: 3, winHits: 120 },
      { name: '天王星', nameEn: 'Uranus', maxType: 3, winHits: 180 },
      { name: '海王星', nameEn: 'Neptune', maxType: 3, winHits: 250 },
      { name: '超新星', nameEn: 'Supernova', maxType: 3, winHits: 350 },
      { name: '卡冈图雅', nameEn: 'Gargantua', maxType: 3, winHits: 500 }
    ];

    // ===== 周目系统 =====
    let currentCycle = 1; // 当前周目（1 = 一周目）
    let currentLevel = 0;

    // 周目难度系数
    const CYCLE_MULTIPLIERS = [
      1.0,   // 一周目
      1.5,   // 二周目
      2.0,   // 三周目
      2.5,   // 四周目
      3.0    // 五周目+
    ];

    // 周目提示语
    const CYCLE_MESSAGES = {
      2: '重启轮回，再续前缘',
      3: '星河无尽，勇者无疆',
      4: '超越极限，永不止步',
      5: '永恒轮回，传说永存'
    };

    function getCycleMultiplier() {
      const idx = Math.min(currentCycle - 1, CYCLE_MULTIPLIERS.length - 1);
      return CYCLE_MULTIPLIERS[idx];
    }

    function getLevel() {
      const level = LEVELS[currentLevel];
      const multiplier = getCycleMultiplier();
      return {
        ...level,
        winHits: Math.floor(level.winHits * multiplier),
        name: level.name,
        nameEn: level.nameEn
      };
    }

    // ===== 游戏模式策略系统 =====
    let gameMode = 'levels';
    let strategy = null;

    const ENDLESS_STAGES = [
      { dist: 0,    name: '启程', nameEn: 'Departure',   colorCount: 3, maxType: 2, gapScale: 1.0,  boostProb: 0.15 },
      { dist: 100,  name: '加速', nameEn: 'Acceleration', colorCount: 3, maxType: 3, gapScale: 1.0,  boostProb: 0.15 },
      { dist: 250,  name: '迷彩', nameEn: 'Camouflage',   colorCount: 4, maxType: 3, gapScale: 1.0,  boostProb: 0.15 },
      { dist: 450,  name: '压缩', nameEn: 'Compression',  colorCount: 4, maxType: 3, gapScale: 0.9,  boostProb: 0.15 },
      { dist: 700,  name: '混沌', nameEn: 'Chaos',        colorCount: 5, maxType: 3, gapScale: 0.85, boostProb: 0.20 },
      { dist: 1000, name: '深渊', nameEn: 'Abyss',        colorCount: 5, maxType: 3, gapScale: 0.8,  boostProb: 0.25 },
      { dist: 1400, name: '无尽', nameEn: 'Infinity',     colorCount: 6, maxType: 3, gapScale: 0.75, boostProb: 0.30 }
    ];

    function getEndlessStage(distance) {
      let stage = ENDLESS_STAGES[0];
      for (const s of ENDLESS_STAGES) {
        if (distance >= s.dist) stage = s;
      }
      return stage;
    }

    let endlessBestDistance = 0;
    let endlessBestStageIndex = 0;
    let endlessTotalRuns = 0;
    let currentStageIndex = 0;

    function saveEndlessProgress() {
      try {
        localStorage.setItem('jumpingBall_endless', JSON.stringify({
          bestDistance: endlessBestDistance,
          bestStageIndex: endlessBestStageIndex,
          totalRuns: endlessTotalRuns
        }));
      } catch (e) {}
    }

    function loadEndlessProgress() {
      try {
        const data = localStorage.getItem('jumpingBall_endless');
        if (data) {
          const parsed = JSON.parse(data);
          endlessBestDistance = parsed.bestDistance || 0;
          endlessBestStageIndex = parsed.bestStageIndex || 0;
          endlessTotalRuns = parsed.totalRuns || 0;
        }
      } catch (e) {}
    }

    const levelStrategy = {
      getAvailableColors() {
        const base = ['pink', 'yellow', 'blue'];
        if (currentLevel >= 9) return [...base, 'green', 'orange', 'purple'];
        if (currentLevel >= 7) return [...base, 'green', 'orange'];
        if (currentLevel >= 5) return [...base, 'green'];
        return base;
      },
      getMaxType() { return getLevel().maxType; },
      getWinHits() { return getLevel().winHits; },
      getColorCount() {
        if (currentLevel >= 9) return 6;
        if (currentLevel >= 7) return 5;
        if (currentLevel >= 5) return 4;
        return 3;
      },
      getGapScale() { return 1.0; },
      getBoostProb() { return 0.15; },
      hasVictory() { return true; },
      onHitCountReached() {
        const victoryZ = -10 - Math.random() * 8;
        createVictoryTrack(victoryZ);
        blackHoleActive = true;
      },
      onLandOnVictoryTrack() {
        winning = true;
        winTimer = 0;
        velZ = 0;
        falling = false;
        bhAttracting = false;
        hideCombo();
        ballY = floorContact;
        velY = Math.abs(velY);
      },
      checkStageTransition() {},
      getDisplayName() {
        const lv = getLevel();
        const cycleText = currentCycle > 1 ? `第${currentCycle}周目 · ` : '';
        return `${cycleText}${lv.name}`;
      },
      getAnnounceInfo() {
        const lv = getLevel();
        const cycleText = currentCycle > 1 ? `第${currentCycle}周目 · ` : '';
        return {
          num: `${cycleText}LEVEL ${currentLevel + 1}`,
          title: lv.name,
          sub: `跳 ${lv.winHits} 次 · ${this.getColorCount()}种颜色`
        };
      },
      getDistanceTargetText() {
        if (targetDistance !== null) return `目标: ${Math.floor(targetDistance)} m`;
        return '目标: ??? m';
      },
      onGameOver() { showGameOver(); },
      onVictory() { showVictory(); },
      resetState() {
        victoryTrackGroups = [];
        victoryTrackSpawned = false;
        blackHoleActive = false;
        bhAttracting = false;
        winning = false;
        winTimer = 0;
        cleanupBlackHole();
      },
      onGameOverRestart() { showLevelSelect(); },
      onVictoryNext() {
        unlockNextLevel();
        const isLast = currentLevel >= LEVELS.length - 1;
        if (isLast) {
          currentCycle++;
          currentLevel = 0;
          unlockedLevels = [true, false, false, false, false, false, false, false, false, false];
          saveLevelProgress();
          showLevelSelect();
        } else {
          currentLevel++;
          saveLevelProgress();
          startGame();
        }
      },
      saveProgress() { saveLevelProgress(); },
      loadProgress() { loadLevelProgress(); },
    };

    const endlessStrategy = {
      getAvailableColors() {
        const stage = getEndlessStage(totalDistance);
        const base = ['pink', 'yellow', 'blue'];
        const extras = ['green', 'orange', 'purple'];
        return [...base, ...extras.slice(0, stage.colorCount - 3)];
      },
      getMaxType() { return getEndlessStage(totalDistance).maxType; },
      getWinHits() { return Infinity; },
      getColorCount() { return getEndlessStage(totalDistance).colorCount; },
      getGapScale() { return getEndlessStage(totalDistance).gapScale; },
      getBoostProb() { return getEndlessStage(totalDistance).boostProb; },
      hasVictory() { return false; },
      onHitCountReached() {},
      onLandOnVictoryTrack() {},
      checkStageTransition() {
        const stage = getEndlessStage(totalDistance);
        const newIdx = ENDLESS_STAGES.indexOf(stage);
        if (newIdx > currentStageIndex) {
          currentStageIndex = newIdx;
          showEndlessStageAnnounce(stage);
        }
      },
      getDisplayName() {
        const stage = getEndlessStage(totalDistance);
        return `无垠 · ${stage.name}`;
      },
      getAnnounceInfo() {
        const stage = getEndlessStage(totalDistance);
        return {
          num: `阶段 ${currentStageIndex + 1}`,
          title: stage.name,
          sub: `${stage.colorCount}种颜色 · 间距${stage.gapScale < 1 ? '缩小' : '正常'}`
        };
      },
      getDistanceTargetText() {
        return endlessBestDistance > 0 ? `最远: ${endlessBestDistance}m` : '';
      },
      onGameOver() { showEndlessGameOver(); },
      onVictory() {},
      resetState() {
        currentStageIndex = 0;
        victoryTrackGroups = [];
        victoryTrackSpawned = false;
        blackHoleActive = false;
        bhAttracting = false;
        winning = false;
        winTimer = 0;
        cleanupBlackHole();
      },
      onGameOverRestart() { startGame(); },
      onVictoryNext() {},
      saveProgress() { saveEndlessProgress(); },
      loadProgress() { loadEndlessProgress(); },
    };

    function switchMode(mode) {
      gameMode = mode;
      strategy = mode === 'endless' ? endlessStrategy : levelStrategy;
    }

    strategy = levelStrategy;

    // ===== 关卡解锁状态 =====
    let unlockedLevels = [true, false, false, false, false, false, false, false, false, false];

    function unlockNextLevel() {
      const nextLevel = currentLevel + 1;
      if (nextLevel < LEVELS.length && !unlockedLevels[nextLevel]) {
        unlockedLevels[nextLevel] = true;
        saveLevelProgress();
      }
    }

    function saveLevelProgress() {
      try {
        localStorage.setItem('jumpingBall_progress', JSON.stringify({
          unlockedLevels,
          currentLevel,
          currentCycle
        }));
      } catch (e) {}
    }

    function loadLevelProgress() {
      try {
        const data = localStorage.getItem('jumpingBall_progress');
        if (data) {
          const parsed = JSON.parse(data);
          if (parsed.unlockedLevels) unlockedLevels = parsed.unlockedLevels;
          if (typeof parsed.currentLevel === 'number') currentLevel = parsed.currentLevel;
          if (typeof parsed.currentCycle === 'number') currentCycle = parsed.currentCycle;
        }
      } catch (e) {}
    }

    // ===== 关卡选择界面 =====
    const levelSelectOverlay = document.getElementById('levelSelectOverlay');
    const levelCardsContainer = document.getElementById('levelCards');
    const inGameMenuBtn = document.getElementById('inGameMenuBtn');
    const tabLevels = document.getElementById('tabLevels');
    const tabEndless = document.getElementById('tabEndless');
    const endlessPanel = document.getElementById('endlessPanel');
    const endlessBestDistEl = document.getElementById('endlessBestDist');
    const endlessBestStageEl = document.getElementById('endlessBestStage');
    const endlessRunInfoEl = document.getElementById('endlessRunInfo');
    const endlessRunDistEl = document.getElementById('endlessRunDist');
    const endlessRunStageEl = document.getElementById('endlessRunStage');
    const endlessNewRecordEl = document.getElementById('endlessNewRecord');
    const endlessStartBtn = document.getElementById('endlessStartBtn');
    const endlessTotalRunsEl = document.getElementById('endlessTotalRuns');
    const levelSelectTitle = document.getElementById('levelSelectTitle');
    const levelSelectSub = document.getElementById('levelSelectSub');

    let currentTab = 'levels';
    let lastEndlessDistance = 0;
    let lastEndlessStageIndex = 0;
    let lastEndlessNewRecord = false;

    // 获取当前关卡的颜色数量
    function getColorCount() {
      return strategy.getColorCount();
    }

    function switchTab(tab) {
      currentTab = tab;
      tabLevels.classList.toggle('active', tab === 'levels');
      tabEndless.classList.toggle('active', tab === 'endless');
      if (tab === 'levels') {
        levelCardsContainer.style.display = 'flex';
        levelSelectTitle.style.display = 'block';
        levelSelectSub.style.display = 'block';
        endlessPanel.classList.remove('visible');
      } else {
        levelCardsContainer.style.display = 'none';
        levelSelectTitle.style.display = 'none';
        levelSelectSub.style.display = 'none';
        endlessPanel.classList.add('visible');
        updateEndlessPanel();
      }
    }

    tabLevels.addEventListener('click', () => switchTab('levels'));
    tabEndless.addEventListener('click', () => switchTab('endless'));

    function updateEndlessPanel() {
      endlessBestDistEl.textContent = endlessBestDistance > 0 ? `${endlessBestDistance} m` : '0 m';
      if (endlessBestDistance > 0) {
        const stage = ENDLESS_STAGES[endlessBestStageIndex];
        endlessBestStageEl.textContent = `阶段 ${endlessBestStageIndex + 1} · ${stage.name}`;
      } else {
        endlessBestStageEl.textContent = '--';
      }
      endlessTotalRunsEl.textContent = `已挑战 ${endlessTotalRuns} 次`;
      if (lastEndlessDistance > 0) {
        endlessRunInfoEl.style.display = 'block';
        endlessRunDistEl.textContent = `${Math.floor(lastEndlessDistance)} m`;
        const stage = getEndlessStage(lastEndlessDistance);
        const idx = ENDLESS_STAGES.indexOf(stage);
        endlessRunStageEl.textContent = `阶段 ${idx + 1} · ${stage.name}`;
        endlessNewRecordEl.style.display = lastEndlessNewRecord ? 'block' : 'none';
      } else {
        endlessRunInfoEl.style.display = 'none';
      }
    }

    endlessStartBtn.addEventListener('click', () => {
      switchMode('endless');
      startGame();
    });

    // 动态生成关卡卡片
    LEVELS.forEach((lv, i) => {
      const card = document.createElement('div');
      card.className = 'level-card';
      card.dataset.index = i;
      // 计算该关卡的颜色数量
      let colorCount = 3;
      if (i >= 9) colorCount = 6;
      else if (i >= 7) colorCount = 5;
      else if (i >= 5) colorCount = 4;
      
      card.innerHTML = `
        <div class="card-num">LEVEL ${i + 1}</div>
        <div class="card-name">${lv.name}</div>
        <div class="card-name-en">${lv.nameEn}</div>
        <div class="card-desc">${colorCount}种颜色</div>
      `;
      card.addEventListener('click', () => {
        if (!unlockedLevels[i]) return;
        currentLevel = i;
        saveLevelProgress();
        switchMode('levels');
        startGame();
      });
      levelCardsContainer.appendChild(card);
    });

    function updateCardStates() {
      const cards = levelCardsContainer.querySelectorAll('.level-card');
      cards.forEach((card, i) => {
        card.classList.toggle('active', i === currentLevel);
        card.classList.toggle('locked', !unlockedLevels[i]);
      });
    }

    function showLevelSelect() {
      switchMode('levels');
      updateCardStates();
      if (currentCycle > 1) {
        levelSelectTitle.textContent = `第${currentCycle}周目`;
        levelSelectSub.textContent = `难度系数: ${getCycleMultiplier()}x`;
      } else {
        levelSelectTitle.textContent = '选择关卡';
        levelSelectSub.textContent = 'INTERSTELLAR';
      }
      switchTab(currentTab);
      levelSelectOverlay.style.display = 'flex';
      inGameMenuBtn.style.display = 'none';
    }

    function showEndlessSelect() {
      switchMode('endless');
      switchTab('endless');
      updateEndlessPanel();
      levelSelectOverlay.style.display = 'flex';
      inGameMenuBtn.style.display = 'none';
    }

    function hideLevelSelect() {
      levelSelectOverlay.style.display = 'none';
    }

    function startGame() {
      hideLevelSelect();
      inGameMenuBtn.style.display = 'block';
      strategy.loadProgress();
      resetGame();
    }

    inGameMenuBtn.addEventListener('click', () => {
      if (gameMode === 'endless') {
        showEndlessSelect();
      } else {
        showLevelSelect();
      }
    });

    loadLevelProgress();
    loadEndlessProgress();
    showLevelSelect();

    // ===== 轨道组系统 =====
    // 每个轨道组: { type, meshes[], mats[], z }
    // z = 组中心 Z 坐标（球落地时需要对齐到 Z=0 的点）
    const trackGroups = [];
    const groupZList  = [];

    // 类型1：长直轨道（单块长板，一种颜色）
    function createType1(z, colorKey) {
      const mat = makeMat(colorKey);
      const mesh = new THREE.Mesh(longGeo, mat);
      mesh.position.set(0, GROUND_Y + PLATE_HEIGHT / 2, z);
      mesh.receiveShadow = true;
      mesh.castShadow = true;
      scene.add(mesh);
      return { type: 1, meshes: [mesh], mats: [mat], z, colorKey };
    }

    // 类型2：两块有间隔的方形轨道（二色各一，随机排列）
    function createType2(z, colors) {
      const result = { type: 2, meshes: [], mats: [], z, colorKeys: [] };
      const offset = SQ_SPACING * 0.65;
      const xPositions = [-offset, offset];
      for (let i = 0; i < 2; i++) {
        const mats = makeSqMats(colors[i]);
        const mesh = new THREE.Mesh(sqGeo, mats);
        mesh.position.set(xPositions[i], GROUND_Y + PLATE_HEIGHT / 2, z);
        mesh.receiveShadow = true;
        mesh.castShadow = true;
        scene.add(mesh);
        result.meshes.push(mesh);
        result.mats.push(...mats);
        result.colorKeys.push(colors[i]);
      }
      return result;
    }

    // 类型3：三块有间隔的方形轨道（三色各一）
    function createType3(z, colors) {
      const result = { type: 3, meshes: [], mats: [], z, colorKeys: [] };
      const xPositions = [-SQ_SPACING, 0, SQ_SPACING];
      for (let i = 0; i < 3; i++) {
        const mats = makeSqMats(colors[i]);
        const mesh = new THREE.Mesh(sqGeo, mats);
        mesh.position.set(xPositions[i], GROUND_Y + PLATE_HEIGHT / 2, z);
        mesh.receiveShadow = true;
        mesh.castShadow = true;
        scene.add(mesh);
        result.meshes.push(mesh);
        result.mats.push(...mats);
        result.colorKeys.push(colors[i]);
      }
      return result;
    }

    // 类型4：加速长直轨道（白色发光，不改变球颜色，触发3倍重力加速）
    function createType4(z) {
      const mat = makeBoostMat();
      const mesh = new THREE.Mesh(longGeo, mat);
      mesh.position.set(0, GROUND_Y + PLATE_HEIGHT / 2, z);
      mesh.receiveShadow = true;
      mesh.castShadow = true;
      scene.add(mesh);
      return { type: 4, meshes: [mesh], mats: [mat], z, colorKey: 'boost' };
    }

    // 类型5：通关轨道（黑洞入口，踩到即通关）
    // 生成三块连续的轨道，中间一块是通关判定区
    let victoryTrackGroups = []; // 存储通关轨道组的索引
    let victoryTrackSpawned = false; // 是否已生成通关轨道

    function createVictoryTrack(startZ) {
      const VICTORY_GAP = 6 + Math.random() * 3;

      const group1 = createType1(startZ, randColor());
      trackGroups.push(group1);
      groupZList.push(startZ);

      const z2 = startZ - VICTORY_GAP;
      const group2 = createType1(z2, randColor());
      group2.isVictoryTrack = true;
      trackGroups.push(group2);
      groupZList.push(z2);
      victoryTrackGroups.push(trackGroups.length - 1);

      const z3 = z2 - VICTORY_GAP;
      const group3 = createType1(z3, randColor());
      trackGroups.push(group3);
      groupZList.push(z3);

      for (let i = trackGroups.length - 1; i >= 0; i--) {
        const gz = groupZList[i];
        if (gz < z3 - 2 && !trackGroups[i].isVictoryTrack) {
          disposeGroup(trackGroups[i]);
          trackGroups.splice(i, 1);
          groupZList.splice(i, 1);
          for (let j = 0; j < victoryTrackGroups.length; j++) {
            if (victoryTrackGroups[j] === i) {
              victoryTrackGroups.splice(j, 1);
              j--;
            } else if (victoryTrackGroups[j] > i) {
              victoryTrackGroups[j]--;
            }
          }
        } else if ((trackGroups[i].type === 2 || trackGroups[i].type === 3) && gz >= z3 - 2 && gz <= startZ + 2) {
          const oldColor = trackGroups[i].colorKeys ? trackGroups[i].colorKeys[0] : randColor();
          disposeGroup(trackGroups[i]);
          const replacement = createType1(gz, oldColor);
          replacement.isVictoryTrack = trackGroups[i].isVictoryTrack;
          trackGroups[i] = replacement;
        }
      }

      createBlackHole(z2);
      bhGroup.scale.setScalar(1);

      targetDistance = totalDistance + Math.abs(z2);
      updateDistanceUI();

      victoryTrackSpawned = true;
    }

    // 随机创建一个轨道组
    // safeColor：当前球颜色，方形轨道必须包含此颜色以保证路径连通
    // maxType：最大轨道类型（1=仅长直, 2=长直+两方块, 3=全部）
    function createRandomGroup(z, safeColor, maxType) {
      maxType = maxType || 3;
      // 15% 概率生成加速轨道（类型4）
      if (Math.random() < strategy.getBoostProb()) {
        const group = createType4(z);
        trackGroups.push(group);
        groupZList.push(z);
        return group;
      }
      const type = Math.floor(Math.random() * maxType) + 1;
      let group;
      if (type === 1) {
        group = createType1(z, randColor());
      } else if (type === 2) {
        // 两块方块：必须包含 safeColor
        const available = getAvailableColors().filter(k => k !== safeColor);
        const other = available[Math.floor(Math.random() * available.length)];
        const cols = [safeColor, other].sort(() => Math.random() - 0.5);
        group = createType2(z, cols);
      } else {
        const available = getAvailableColors().filter(k => k !== safeColor);
        const shuffled = [...available].sort(() => Math.random() - 0.5);
        const otherTwo = shuffled.slice(0, 2);
        const cols = [safeColor, ...otherTwo].sort(() => Math.random() - 0.5);
        group = createType3(z, cols);
      }
      trackGroups.push(group);
      groupZList.push(z);
      return group;
    }

    function disposeGroup(group) {
      for (const m of group.meshes) scene.remove(m);
      for (const mat of group.mats) mat.dispose();
    }

    function removeGroup(idx) {
      disposeGroup(trackGroups[idx]);
      trackGroups.splice(idx, 1);
      groupZList.splice(idx, 1);
      // 更新 victoryTrackGroups 中的索引
      for (let i = 0; i < victoryTrackGroups.length; i++) {
        if (victoryTrackGroups[i] === idx) {
          // 通关轨道被移除，从列表中删除
          victoryTrackGroups.splice(i, 1);
          i--;
        } else if (victoryTrackGroups[i] > idx) {
          // 索引大于被移除的索引，需要减 1
          victoryTrackGroups[i]--;
        }
      }
    }

    function randGap() {
      return (GAP_MIN + Math.random() * (GAP_MAX - GAP_MIN)) * strategy.getGapScale();
    }

    // 追踪最近的长直轨道颜色，用于保证路径连通
    let lastLongTrackColor = null;

    // 初始化轨道：前 5 个固定为长直轨道，之后随机
    function generateInitialGroups() {
      let z = 0;
      // 前 5 个固定为长直轨道
      for (let i = 0; i < 5; i++) {
        const g = createType1(z, randColor());
        trackGroups.push(g);
        groupZList.push(z);
        z -= randGap();
      }
      // 记录最后一个长直轨道颜色作为 safeColor
      lastLongTrackColor = trackGroups[trackGroups.length - 1].colorKey;
      // 继续随机生成直到填满可见区域
      while (z > -VISIBLE_DEPTH) {
        z -= randGap();
        createRandomGroup(z, lastLongTrackColor, strategy.getMaxType());
        const newGroup = trackGroups[trackGroups.length - 1];
        if (newGroup.type === 1) {
          lastLongTrackColor = newGroup.colorKey;
        }
      }
    }
    generateInitialGroups();

    const FADE_START = 3;
    const FADE_END   = 12;

    function updateTrack(deltaZ) {
      totalDistance += deltaZ;
      for (let i = 0; i < trackGroups.length; i++) {
        groupZList[i] += deltaZ;
        trackGroups[i].z = groupZList[i];
        for (const m of trackGroups[i].meshes) {
          m.position.z = groupZList[i];
        }
      }

      // 黑洞跟随通关轨道移动
      if (bhGroup && victoryTrackGroups.length > 0) {
        // 找到通关轨道的位置
        const victoryGroupIdx = victoryTrackGroups.find(idx => idx < trackGroups.length);
        if (victoryGroupIdx !== undefined) {
          const victoryGroup = trackGroups[victoryGroupIdx];
          if (victoryGroup) {
            bhGroup.position.z = victoryGroup.z;
            // 更新目标距离
            if (targetDistance !== null) {
              targetDistance = totalDistance + Math.abs(victoryGroup.z);
            }
          }
        }
      }

      // 淡出 + 销毁（但保护通关轨道及其前后轨道）
      for (let i = trackGroups.length - 1; i >= 0; i--) {
        const z = groupZList[i];
        // 通关轨道及其前后轨道不销毁（直到球踩到为止）
        const isNearVictory = victoryTrackGroups.some(vIdx => {
          if (vIdx === undefined || vIdx >= trackGroups.length) return false;
          const vz = trackGroups[vIdx].z;
          return Math.abs(z - vz) < 30;
        });
        if (trackGroups[i].isVictoryTrack || isNearVictory) continue;
        if (z > FADE_START) {
          const ratio = Math.min(1, (z - FADE_START) / (FADE_END - FADE_START));
          for (const mat of trackGroups[i].mats) {
            mat.opacity = 1.0 - ratio;
          }
        }
        if (z > FADE_END) {
          removeGroup(i);
        }
      }

      if (!victoryTrackSpawned || !strategy.hasVictory()) {
        let minZ = groupZList.length > 0 ? Math.min(...groupZList) : 0;
        while (minZ > -VISIBLE_DEPTH) {
          minZ -= randGap();
          createRandomGroup(minZ, lastLongTrackColor, strategy.getMaxType());
          const newGroup = trackGroups[trackGroups.length - 1];
          if (newGroup.type === 1) {
            lastLongTrackColor = newGroup.colorKey;
          }
        }
      }
    }

    const sphereGeo = new THREE.SphereGeometry(BALL_RADIUS, 64, 64);
    const sphereMat = new THREE.MeshStandardMaterial({
      color: 0x4488ff, metalness: 0.3, roughness: 0.2, emissive: 0x112244
    });
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    sphere.castShadow = true;
    scene.add(sphere);

    const wireMesh = new THREE.Mesh(sphereGeo,
      new THREE.MeshBasicMaterial({ color: 0x88ccff, wireframe: true, transparent: true, opacity: 0.08 })
    );
    scene.add(wireMesh);

    const ringCount = 120;
    const ringPos   = new Float32Array(ringCount * 3);
    for (let i = 0; i < ringCount; i++) {
      const a = (i / ringCount) * Math.PI * 2;
      const r = 0.8 + Math.random() * 0.1;
      ringPos[i * 3]     = Math.cos(a) * r;
      ringPos[i * 3 + 1] = (Math.random() - 0.5) * 0.1;
      ringPos[i * 3 + 2] = Math.sin(a) * r;
    }
    const ringGeo = new THREE.BufferGeometry();
    ringGeo.setAttribute('position', new THREE.BufferAttribute(ringPos, 3));
    const ring = new THREE.Points(ringGeo,
      new THREE.PointsMaterial({ color: 0x66aaff, size: 0.04, transparent: true, opacity: 0.7 }));
    scene.add(ring);

    // 球状态
    const floorContact = GROUND_Y + BALL_RADIUS;
    let ballX       = 0;
    let ballY       = floorContact;  // 从地面开始
    let velY        = Math.sqrt(2 * _g * INIT_HEIGHT); // 上抛速度，保证恰好到 INIT_HEIGHT
    let velZ        = 0;            // 轨道 Z 方向速度（正值=轨道向球靠近）
    let falling     = false;        // 是否正在坠落（没踩到轨道）

    // ===== 鼠标 X 轴缓动控制 =====
    // 鼠标累计输入 → 缓动目标 → 实际球位置
    const MOUSE_SENSITIVITY = 0.012;      // 鼠标原始灵敏度
    const LERP_SMOOTHNESS  = 0.12;        // 缓动系数（0~1，越小越丝滑延迟越大）
    let mouseDeltaX = 0;                  // 每帧鼠标原始输入累计
    let ballXTarget  = 0;                 // 缓动目标位置（鼠标直接驱动）
    document.addEventListener('mousemove', (e) => {
      if (e.movementX !== undefined) {
        mouseDeltaX += e.movementX;
      }
    });

    // 球（圆）与方块（AABB）的碰撞检测
    // 返回 { group, colorKey, mesh } 或 null
    function findCollisionWithAnyGroup() {
      const r = BALL_RADIUS;
      let bestGroup = null, bestColorKey = null, bestMesh = null;
      let bestDist = Infinity;
      for (let gi = 0; gi < trackGroups.length; gi++) {
        const group = trackGroups[gi];
        const gz = groupZList[gi];
        for (let mi = 0; mi < group.meshes.length; mi++) {
          const mesh = group.meshes[mi];
          const bx = mesh.position.x;
          const by = mesh.position.y;
          let hsx, hsz;
          if (group.type === 1 || group.type === 4) {
            hsx = LONG_SIZE_X / 2;
            hsz = LONG_SIZE_Z / 2;
          } else {
            hsx = SQ_SIZE / 2;
            hsz = SQ_SIZE / 2;
          }
          const hsy = PLATE_HEIGHT / 2;
          const closestX = Math.max(bx - hsx, Math.min(ballX, bx + hsx));
          const closestY = Math.max(by - hsy, Math.min(ballY, by + hsy));
          const closestZ = Math.max(gz - hsz, Math.min(0, gz + hsz));
          const dx = ballX - closestX;
          const dy = ballY - closestY;
          const dz = 0 - closestZ;
          const dist = dx * dx + dy * dy + dz * dz;
          if (dist < r * r && dist < bestDist) {
            bestDist = dist;
            bestGroup = group;
            bestMesh = mesh;
            bestColorKey = group.colorKeys ? group.colorKeys[mi] : group.colorKey;
          }
        }
      }
      return bestGroup ? { group: bestGroup, colorKey: bestColorKey, mesh: bestMesh } : null;
    }

    // 当前球的颜色 key（初始为 null）
    let ballColorKey = null;

    // 碎裂系统
    const DEATH_DURATION = 1.0; // 碎裂动画时长（秒）
    let dying = false;
    let deathTimer = 0;
    const deathFragments = []; // 碎片：{ mesh, vel, angularVel }
    const deathParticles = []; // 粒子：{ mesh, vel, life }

    // 碰到异色方块 → 碎裂死亡
    function triggerDeath(plateColorKey) {
      dying = true;
      deathTimer = 0;
      velZ = 0;
      // 隐藏连击
      hideCombo();

      // 隐藏球本体 + 光环
      sphere.visible = false;
      wireMesh.visible = false;
      ring.visible = false;

      // 生成碎片（用球体的小块模拟）
      const fragGeo = new THREE.IcosahedronGeometry(BALL_RADIUS * 0.25, 1);
      const fragCount = 25;
      for (let i = 0; i < fragCount; i++) {
        const fragMat = new THREE.MeshStandardMaterial({
          color: sphereMat.color.clone(),
          metalness: 0.3, roughness: 0.2,
          emissive: sphereMat.emissive.clone(),
          transparent: true, opacity: 1.0
        });
        const frag = new THREE.Mesh(fragGeo, fragMat);
        frag.position.set(ballX, ballY, 0);
        scene.add(frag);
        // 随机方向速度
        const speed = 3 + Math.random() * 5;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI;
        deathFragments.push({
          mesh: frag,
          mat: fragMat,
          vel: new THREE.Vector3(
            Math.sin(phi) * Math.cos(theta) * speed,
            Math.abs(Math.cos(phi)) * speed * 0.8 + 2,
            Math.sin(phi) * Math.sin(theta) * speed
          ),
          angularVel: new THREE.Vector3(
            (Math.random() - 0.5) * 10,
            (Math.random() - 0.5) * 10,
            (Math.random() - 0.5) * 10
          )
        });
      }

      // 生成粒子（小球）
      const particleGeo = new THREE.SphereGeometry(BALL_RADIUS * 0.06, 4, 4);
      const particleCount = 80;
      for (let i = 0; i < particleCount; i++) {
        const pMat = new THREE.MeshBasicMaterial({
          color: [0xff68fd, 0xffe528, 0x15befc, 0xffffff][Math.floor(Math.random() * 4)],
          transparent: true, opacity: 1.0
        });
        const particle = new THREE.Mesh(particleGeo, pMat);
        particle.position.set(ballX, ballY, 0);
        scene.add(particle);
        const speed = 1.5 + Math.random() * 7;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI;
        deathParticles.push({
          mesh: particle,
          mat: pMat,
          vel: new THREE.Vector3(
            Math.sin(phi) * Math.cos(theta) * speed,
            Math.abs(Math.cos(phi)) * speed * 0.6 + 1,
            Math.sin(phi) * Math.sin(theta) * speed
          ),
          life: 0.6 + Math.random() * 0.4
        });
      }

      setTimeout(() => {
        strategy.onGameOver();
      }, DEATH_DURATION * 1000);
    }

    // 更新碎裂动画
    function updateDeath(dt) {
      if (!dying) return;
      deathTimer += dt;

      // 更新碎片
      for (const f of deathFragments) {
        f.vel.y -= 9.8 * dt;
        f.mesh.position.addScaledVector(f.vel, dt);
        f.mesh.rotation.x += f.angularVel.x * dt;
        f.mesh.rotation.y += f.angularVel.y * dt;
        f.mesh.rotation.z += f.angularVel.z * dt;
        // 渐隐
        const alpha = Math.max(0, 1 - deathTimer / DEATH_DURATION);
        f.mat.opacity = alpha;
      }

      // 更新粒子
      for (const p of deathParticles) {
        p.vel.y -= 6 * dt;
        p.mesh.position.addScaledVector(p.vel, dt);
        // 粒子生命结束就快速消失
        const lifeRatio = Math.max(0, p.life - deathTimer / DEATH_DURATION);
        p.mat.opacity = lifeRatio;
        // 缩小
        const scale = Math.max(0.01, lifeRatio);
        p.mesh.scale.setScalar(scale);
      }
    }

    // 清理碎裂资源
    function cleanupDeath() {
      for (const f of deathFragments) {
        scene.remove(f.mesh);
        f.mat.dispose();
      }
      deathFragments.length = 0;
      for (const p of deathParticles) {
        scene.remove(p.mesh);
        p.mat.dispose();
      }
      deathParticles.length = 0;
    }

    // 每次落地时：更新球颜色和 Z 速度
    function onLandUpdateVelZ() {
      // 找当前脚下的组（Z 最接近 0）
      let landingIdx = -1;
      let landingZ = Infinity;
      for (let i = 0; i < groupZList.length; i++) {
        if (Math.abs(groupZList[i]) < landingZ) {
          landingZ = Math.abs(groupZList[i]);
          landingIdx = i;
        }
      }

      if (landingIdx >= 0) {
        const group = trackGroups[landingIdx];
        // 长直轨道变色（类型4加速轨道不变色）
        if (group.type === 1 && group.colorKey && group.colorKey !== 'boost') {
          const cKey = group.colorKey;
          const rgb = COLORS[cKey].rgb;
          sphereMat.color.set(COLORS[cKey].hex);
          sphereMat.emissive.set(new THREE.Color(rgb[0]*0.3/255, rgb[1]*0.3/255, rgb[2]*0.3/255));
          ballColorKey = cKey;
          // 粒子颜色跟随球变色
          setBoostParticleColor(cKey);
        }
      }
      // 找下一组，计算 Z 速度（使用当前弹跳周期，加速时周期更短）
      let nearestAheadZ = -Infinity;
      for (const z of groupZList) {
        if (z < -0.5 && z > nearestAheadZ) {
          nearestAheadZ = z;
        }
      }
      if (nearestAheadZ > -Infinity) {
        const period = getCurrentBouncePeriod();
        velZ = Math.abs(nearestAheadZ) / period;
      }
    }

    // ===== 着陆特效系统 =====
    const landEffects = []; // 着陆特效列表
    const RIPPLE_DURATION = 1.0; // 涟漪扩散时长
    const PRESS_DURATION = 0.5; // 下陷回弹时长

    // 涟漪羽化着色器：中心亮、边缘柔化到全透明
    const rippleVertexShader = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;
    const rippleFragmentShader = `
      uniform vec3 uColor;
      uniform float uProgress;
      varying vec2 vUv;
      void main() {
        vec2 centered = abs(vUv - 0.5) * 2.0;
        float boxDist = max(centered.x, centered.y);
        // 内边缘柔和填充
        float innerFill = 1.0 - smoothstep(0.0, 0.08, boxDist);
        // 外边缘羽化（柔和过渡到透明）
        float outerFade = 1.0 - smoothstep(0.0, 0.6, boxDist);
        // 整体亮度随扩散渐弱
        float masterFade = 1.0 - smoothstep(0.3, 1.0, uProgress);
        float alpha = (innerFill * 0.7 + outerFade * 0.3) * masterFade;
        // 中心发光光晕
        float glow = exp(-boxDist * 3.0) * masterFade * 0.5;
        vec3 col = uColor * (1.0 + glow * 0.5);
        gl_FragColor = vec4(col, alpha + glow * 0.4);
      }
    `;

    // 触发着陆特效：方块下陷 + 方形涟漪（带粒子）
    function triggerLandEffect(plateMesh, plateColorKey, plateGroup, plateW, plateD) {
      const baseY = GROUND_Y + PLATE_HEIGHT / 2;
      // 下陷动画
      landEffects.push({
        mesh: plateMesh,
        baseY,
        timer: 0,
        duration: PRESS_DURATION,
        type: 'press'
      });

      // 加速轨道使用白色
      let rgb;
      if (plateColorKey === 'boost') {
        rgb = [220, 220, 255];
      } else {
        rgb = COLORS[plateColorKey].rgb;
      }
      const color = new THREE.Color(rgb[0]/255, rgb[1]/255, rgb[2]/255);

      // ---- 涟漪面（ShaderMaterial 羽化） ----
      const rippleGeo = new THREE.PlaneGeometry(plateW, plateD);
      const rippleMat = new THREE.ShaderMaterial({
        uniforms: {
          uColor: { value: color },
          uProgress: { value: 0.0 }
        },
        vertexShader: rippleVertexShader,
        fragmentShader: rippleFragmentShader,
        transparent: true,
        side: THREE.DoubleSide,
        depthWrite: false
      });
      const ripple = new THREE.Mesh(rippleGeo, rippleMat);
      ripple.rotation.x = -Math.PI / 2;
      // 涟漪在方块底面下方（下陷位置之下）
      plateMesh.add(ripple);
      ripple.position.set(0, -PLATE_HEIGHT / 2 - 0.005, 0);
      landEffects.push({
        mesh: ripple,
        parentMesh: plateMesh,
        timer: 0,
        duration: RIPPLE_DURATION,
        type: 'ripple',
        mat: rippleMat
      });

      // ---- 边缘粒子 ----
      const edgeCount = 40;
      const posArr = new Float32Array(edgeCount * 3);
      // 初始位置：方块边缘随机分布
      const edgePositions = [];
      for (let i = 0; i < edgeCount; i++) {
        // 随机选一条边
        const edge = Math.floor(Math.random() * 4);
        const t = (Math.random() - 0.5); // -0.5 ~ 0.5
        let x, z;
        switch(edge) {
          case 0: x = plateW/2 * t; z = plateD/2; break;
          case 1: x = plateW/2 * t; z = -plateD/2; break;
          case 2: x = plateW/2; z = plateD/2 * t; break;
          case 3: x = -plateW/2; z = plateD/2 * t; break;
        }
        posArr[i*3] = x;
        posArr[i*3+1] = 0;
        posArr[i*3+2] = z;
        // 记录扩散方向（从中心向外）
        const len = Math.sqrt(x*x + z*z) || 1;
        edgePositions.push({ x, z, dx: x/len, dz: z/len });
      }
      const particleGeo = new THREE.BufferGeometry();
      particleGeo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
      const particleMat = new THREE.PointsMaterial({
        color: color,
        size: 0.06,
        transparent: true,
        opacity: 1.0,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });
      const particles = new THREE.Points(particleGeo, particleMat);
      particles.rotation.x = -Math.PI / 2;
      plateMesh.add(particles);
      particles.position.set(0, -PLATE_HEIGHT / 2 - 0.005, 0);
      landEffects.push({
        mesh: particles,
        parentMesh: plateMesh,
        timer: 0,
        duration: RIPPLE_DURATION,
        type: 'particles',
        mat: particleMat,
        geo: particleGeo,
        edgePositions,
        origPositions: posArr.slice()
      });
    }

    // 更新着陆特效
    function updateLandEffects(dt) {
      for (let i = landEffects.length - 1; i >= 0; i--) {
        const fx = landEffects[i];
        fx.timer += dt;
        const progress = Math.min(1, fx.timer / fx.duration);
        const eased = 1 - Math.pow(1 - progress, 2); // ease-out

        if (fx.type === 'press') {
          const t = progress;
          const pressDepth = 0.18;
          if (t < 0.5) {
            const ease = t * 2;
            fx.mesh.position.y = fx.baseY - pressDepth * ease;
          } else {
            const ease = (t - 0.5) * 2;
            const overshoot = Math.sin(ease * Math.PI) * 0.015;
            fx.mesh.position.y = fx.baseY - pressDepth * (1 - ease) + overshoot;
          }
        } else if (fx.type === 'ripple') {
          // 涟漪扩大 + 羽化渐隐
          const scale = 1 + eased * 8;
          fx.mesh.scale.setScalar(scale);
          fx.mat.uniforms.uProgress.value = progress;
        } else if (fx.type === 'particles') {
          // 粒子沿扩散方向飞出 + 渐隐
          const posAttr = fx.geo.getAttribute('position');
          for (let j = 0; j < fx.edgePositions.length; j++) {
            const ep = fx.edgePositions[j];
            const dist = eased * 1.5; // 飞出距离
            posAttr.array[j*3]   = fx.origPositions[j*3]   + ep.dx * dist;
            posAttr.array[j*3+1] = Math.sin(progress * Math.PI) * 0.05;
            posAttr.array[j*3+2] = fx.origPositions[j*3+2] + ep.dz * dist;
          }
          posAttr.needsUpdate = true;
          fx.mat.opacity = (1 - progress) * 0.8;
        }

        if (fx.timer >= fx.duration) {
          if (fx.type === 'press') {
            fx.mesh.position.y = fx.baseY;
          } else {
            if (fx.parentMesh) fx.parentMesh.remove(fx.mesh);
            fx.mesh.geometry.dispose();
            if (fx.mat.dispose) fx.mat.dispose();
          }
          landEffects.splice(i, 1);
        }
      }
    }

    // ===== 连击鼓励系统 =====
    const comboUI     = document.getElementById('comboUI');
    const comboWord   = document.getElementById('comboWord');
    const comboCount  = document.getElementById('comboCount');
    let comboCount_   = 0;         // 连击数
    let comboVisible  = false;     // 当前是否可见
    let comboTimeout  = null;      // 自动隐藏定时器
    const COMBO_HIDE_DELAY = 2000; // 2秒无碰撞自动隐藏

    function triggerCombo() {
      comboCount_++;
      const word = Math.random() > 0.2 ? 'PERFECT' : 'GREAT';

      comboWord.textContent = word;
      comboUI.classList.add('visible');
      comboVisible = true;

      // 每次都重新播放弹出动画
      comboWord.classList.remove('pop');
      void comboWord.offsetWidth;
      comboWord.classList.add('pop');

      comboCount.textContent = `x${comboCount_}`;
      comboCount.classList.remove('bump');
      void comboCount.offsetWidth;
      comboCount.classList.add('bump');

      // 更新发光颜色为当前球颜色
      if (ballColorKey) {
        const rgb = COLORS[ballColorKey].rgb;
        const glowColor = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
        const shadow = `0 0 20px ${glowColor}, 0 0 40px ${glowColor}, 0 0 80px rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.4)`;
        comboWord.style.textShadow = shadow;
        comboCount.style.textShadow = `0 0 12px ${glowColor}, 0 0 24px rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.3)`;
      }

      // 重置自动隐藏计时
      if (comboTimeout) clearTimeout(comboTimeout);
      comboTimeout = setTimeout(() => {
        comboUI.classList.remove('visible');
        comboVisible = false;
        comboCount_ = 0;
      }, COMBO_HIDE_DELAY);
    }

    function hideCombo() {
      comboUI.classList.remove('visible');
      comboVisible = false;
      comboCount_ = 0;
      if (comboTimeout) { clearTimeout(comboTimeout); comboTimeout = null; }
    }

    // GameOver 弹窗控制
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const restartBtn = document.getElementById('restartBtn');
    const retryBtn = document.getElementById('retryBtn');
    const backToMenuLink = document.getElementById('backToMenuLink');
    const gameOverEndlessInfo = document.getElementById('gameOverEndlessInfo');
    const goDistEl = document.getElementById('goDist');
    const goStageEl = document.getElementById('goStage');

    function showEndlessGameOver() {

      const isNewRecord = dist > endlessBestDistance;

    // 坠落后超过一定距离，重置游戏
    const FALL_RESET_Y = -30;
    let hitCount = 0;     // 碰撞计数
    let totalDistance = 0; // 行进总距离
    let blackHoleActive = false;
    let winning = false;  // 进入黑洞后的胜利状态
    let winTimer = 0;
    let targetDistance = null; // 黑洞出现时的距离
